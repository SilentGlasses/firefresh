name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

defaults:
  run:
    shell: bash

jobs:
  python-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Build Python package artifacts
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install build
          python3 -m build --sdist --wheel

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: python-release-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  deb-aur-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Preflight metadata and script checks
        run: |
          set -euo pipefail
          ! grep -R -E 'example\.invalid|noreply@example\.invalid' packaging automation \
            --exclude='test_packages.sh' || {
            echo "Placeholder metadata found in packaging or automation helpers."
            exit 1
          }
          bash -n automation/*.sh

      - name: Build DEB and AUR artifacts
        run: |
          set -euo pipefail
          make package-deb
          make package-aur

      - name: Smoke test DEB and AUR artifacts
        run: |
          set -euo pipefail
          bash automation/test_packages.sh

      - name: Upload DEB and AUR artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: deb-aur-release-artifacts
          path: |
            dist/*.deb
            dist/aur/*
          if-no-files-found: error
          retention-days: 30

  rpm-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: fedora:41

    steps:
      - name: Install dependencies
        run: |
          set -euo pipefail
          dnf -y install git make python3 python3-pip rpm-build findutils tar gzip coreutils

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Preflight metadata and script checks
        run: |
          set -euo pipefail
          ! grep -R -E 'example\.invalid|noreply@example\.invalid' packaging automation \
            --exclude='test_packages.sh' || {
            echo "Placeholder metadata found in packaging or automation helpers."
            exit 1
          }
          bash -n automation/*.sh

      - name: Build RPM artifact
        run: |
          set -euo pipefail
          make package-rpm

      - name: Smoke test RPM artifact
        run: |
          set -euo pipefail
          bash automation/test_packages.sh

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: rpm-release-artifacts
          path: dist/*.rpm
          if-no-files-found: error
          retention-days: 30

  publish-release:
    needs:
      - python-artifacts
      - deb-aur-artifacts
      - rpm-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-release-artifacts
          path: dist/

      - name: Download DEB and AUR artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: deb-aur-release-artifacts
          path: dist/

      - name: Download RPM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: rpm-release-artifacts
          path: dist/

      - name: Verify release files
        run: |
          set -euo pipefail
          ls -R dist

      - name: Upload aggregated workflow artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-packages
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: |
            dist/*.deb
            dist/*.rpm
            dist/*.whl
            dist/*.tar.gz
            dist/aur/*

      - name: Publish release assets (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.whl
            dist/*.tar.gz
            dist/aur/*
