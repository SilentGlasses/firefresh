name: Packaging CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: packaging-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deb-aur-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Preflight metadata and script checks
        run: |
          set -euo pipefail
          ! grep -R -E 'example\.invalid|noreply@example\.invalid' packaging automation \
            --exclude='test_packages.sh' || {
            echo "Placeholder metadata found in packaging or automation helpers."
            exit 1
          }
          bash -n automation/*.sh

      - name: Build DEB and AUR artifacts
        run: |
          set -euo pipefail
          make package-deb
          make package-aur

      - name: Smoke test artifacts
        run: |
          set -euo pipefail
          bash automation/test_packages.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: deb-aur-artifacts
          path: dist/
          if-no-files-found: error
          retention-days: 14

  rpm-fedora:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: fedora:41
    steps:
      - name: Install dependencies
        run: |
          set -euo pipefail
          dnf -y install git make python3 python3-pip rpm-build findutils tar gzip coreutils

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Preflight metadata and script checks
        run: |
          set -euo pipefail
          ! grep -R -E 'example\.invalid|noreply@example\.invalid' packaging automation \
            --exclude='test_packages.sh' || {
            echo "Placeholder metadata found in packaging or automation helpers."
            exit 1
          }
          bash -n automation/*.sh

      - name: Build RPM artifact
        run: |
          set -euo pipefail
          make package-rpm

      - name: Smoke test RPM artifact
        run: |
          set -euo pipefail
          bash automation/test_packages.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: rpm-artifacts
          path: dist/
          if-no-files-found: error
          retention-days: 14

  aur-arch-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm git make python

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Preflight metadata and script checks
        run: |
          set -euo pipefail
          ! grep -R -E 'example\.invalid|noreply@example\.invalid' packaging automation \
            --exclude='test_packages.sh' || {
            echo "Placeholder metadata found in packaging or automation helpers."
            exit 1
          }
          bash -n automation/*.sh

      - name: Build AUR bundle
        run: |
          set -euo pipefail
          make package-aur

      - name: Smoke test AUR bundle
        run: |
          set -euo pipefail
          bash automation/test_packages.sh

      - name: Validate PKGBUILD syntax
        run: |
          set -euo pipefail
          bash -n dist/aur/PKGBUILD
          grep -q '^pkgname=firefox-installer' dist/aur/PKGBUILD

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: aur-artifacts
          path: dist/aur/
          if-no-files-found: error
          retention-days: 14
