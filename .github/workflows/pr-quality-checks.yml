name: PR Quality Checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  quality-security:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install ruff bandit pip-audit build
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Preflight script checks
        run: |
          set -euo pipefail
          bash -n install.sh automation/*.sh

      - name: Python lint (ruff)
        run: |
          set -euo pipefail
          ruff check src *.py

      - name: Security scan (bandit)
        run: |
          set -euo pipefail
          bandit -r src -ll

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          set -euo pipefail
          pip-audit -r requirements.txt

      - name: Shell script lint (shellcheck)
        run: |
          set -euo pipefail
          shellcheck install.sh automation/*.sh

      - name: Validate packaging/buildability
        run: |
          set -euo pipefail
          python3 -m build --sdist --wheel
          make package-deb
          make package-aur
